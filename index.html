let sortKey = 'code';
let sortAsc = true;

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const f = document.getElementById('filter').value;
  let filtered = data.filter(r => {
    if (f !== 'all' && r.match !== f) return false;
    if (q && !r.code.includes(q) && !r.entity_name.toLowerCase().includes(q) && !r.pdf_name.toLowerCase().includes(q)) return false;
    return true;
  });
  filtered.sort((a, b) => {
    let va = a[sortKey] || '', vb = b[sortKey] || '';
    if (sortKey === 'code') {
      const ma = va.match(/(\d+)/), mb = vb.match(/(\d+)/);
      if (ma && mb) return sortAsc ? parseInt(ma[1]) - parseInt(mb[1]) : parseInt(mb[1]) - parseInt(ma[1]);
    }
    return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
  });
  const ok = data.filter(r => r.match === '一致').length;
  const bad = data.filter(r => r.match === '不一致').length;
  const miss = data.filter(r => r.match === '無對應').length;
  document.getElementById('summary').innerHTML =
    '<div class="stat"><div class="num">'+data.length+'</div><div class="label">總筆數</div></div>' +
    '<div class="stat"><div class="num" style="color:#22c55e">'+ok+'</div><div class="label">✅ 一致</div></div>' +
    '<div class="stat"><div class="num" style="color:#ef4444">'+bad+'</div><div class="label">❌ 不一致</div></div>' +
    '<div class="stat"><div class="num" style="color:#f59e0b">'+miss+'</div><div class="label">⚠️ 無對應</div></div>';
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = filtered.map(r =>
    '<tr>' +
    '<td class="code">'+r.code+'</td>' +
    '<td class="status">'+r.status+'</td>' +
    '<td class="fname" title="'+r.entity_filename+'">'+r.entity_filename+'</td>' +
    '<td class="fname" title="'+r.pdf_filename+'">'+r.pdf_filename+'</td>' +
    '<td style="font-size:11px;color:#888">'+r.pdf_path+'</td>' +
    '<td class="match-'+r.match+'">'+r.match+'</td>' +
    '</tr>'
  ).join('');
}

function sortBy(key) {
  if (sortKey === key) sortAsc = !sortAsc;
  else { sortKey = key; sortAsc = true; }
  render();
}

function exportCSV() {
  const BOM = '\uFEFF';
  let csv = BOM + '編號,狀態,Entity檔名,Entity品名,PDF檔名,PDF路徑,PDF品名,比對\n';
  data.forEach(r => {
    csv += [r.code, r.status, r.entity_filename, r.entity_name, r.pdf_filename, r.pdf_path, r.pdf_name, r.match].map(v => '"'+v.replace(/"/g,'""')+'"').join(',') + '\n';
  });
  const blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'entity_vs_pdf_comparison.csv';
  a.click();
  URL.revokeObjectURL(a.href);
}
